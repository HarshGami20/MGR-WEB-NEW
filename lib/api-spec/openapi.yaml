      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    # AUTH
    LoginBody:
      type: object
      properties:
        mobile:
          type: string
        password:
          type: string
      required: [mobile, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    ResetPasswordBody:
      type: object
      properties:
        newPassword:
          type: string
      required: [newPassword]

    # USERS
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        mobile:
          type: string
        email:
          type: string
          nullable: true
        roleId:
          type: integer
        role:
          $ref: "#/components/schemas/Role"
          nullable: true
        branchId:
          type: integer
          nullable: true
        branch:
          $ref: "#/components/schemas/Branch"
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, mobile, roleId, isActive, createdAt]

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        mobile:
          type: string
        email:
          type: string
          nullable: true
        password:
          type: string
        roleId:
          type: integer
        branchId:
          type: integer
          nullable: true
      required: [name, mobile, password, roleId]

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        mobile:
          type: string
        email:
          type: string
          nullable: true
        roleId:
          type: integer
        branchId:
          type: integer
          nullable: true

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [data, total, page, limit]

    # ROLES
    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        permissions:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PermissionSet"
        createdAt:
          type: string
          format: date-time
      required: [id, name, permissions, createdAt]

    PermissionSet:
      type: object
      properties:
        view:
          type: boolean
        add:
          type: boolean
        edit:
          type: boolean
        delete:
          type: boolean
      required: [view, add, edit, delete]

    CreateRoleBody:
      type: object
      properties:
        name:
          type: string
        permissions:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PermissionSet"
      required: [name, permissions]

    # CATEGORIES
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        parentId:
          type: integer
          nullable: true
        children:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        createdAt:
          type: string
          format: date-time
      required: [id, name, createdAt]

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        parentId:
          type: integer
          nullable: true
      required: [name]

    # PRODUCTS
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        categoryId:
          type: integer
          nullable: true
        category:
          $ref: "#/components/schemas/Category"
          nullable: true
        price:
          type: number
        gstPercent:
          type: number
        stockQty:
          type: integer
        lowStockThreshold:
          type: integer
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, sku, price, gstPercent, stockQty, lowStockThreshold, createdAt]

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        sku:
          type: string
        categoryId:
          type: integer
          nullable: true
        price:
          type: number
        gstPercent:
          type: number
        stockQty:
          type: integer
        lowStockThreshold:
          type: integer
