kind = "web"
previewPath = "/"
title = "Furniture ERP"
version = "1.0.0"
id = "artifacts/furniture-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18653

[services.development]
run = "pnpm --filter @workspace/furniture-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/furniture-erp", "run", "build" ]
publicDir = "artifacts/furniture-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18653"
BASE_PATH = "/"
